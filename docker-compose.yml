services:
  postgres:
    image: postgres:latest
    container_name: openmenu_postgres
    environment:
      POSTGRES_DB: openmenu
      POSTGRES_USER: openmenu_user
      POSTGRES_PASSWORD: openmenu_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: openmenu_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
